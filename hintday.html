<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Testing!!!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 40px;
      border: 3px solid white;
    }

    h1 {
      margin: 15px 0 5px;
    }

    p.bio {
      font-size: 14px;
      opacity: 0.8;
    }

    .link {
      display: block;
      background: white;
      color: #333;
      padding: 15px;
      margin: 12px 0;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .link:hover {
      transform: scale(1.05);
      background: #f0f0f0;
    }

    .image-block {
      margin: 20px 0;
    }

    .image-block img {
      width: 100%;
      border-radius: 15px;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- PROFILE IMAGE -->
    <img src="your-profile.jpg" alt="Profile Image" class="profile-img">

    <h1>Your Name</h1>
    <p class="bio">Short bio or tagline goes here</p>

    <!-- OPTIONAL IMAGE BLOCK -->
    <div class="image-block">
      <img src="your-image-1.jpg" alt="Optional Image">
    </div>

    <!-- LINKS -->
    <a href="#" class="link">Your Link 1</a>
    <a href="#" class="link">Your Link 2</a>
    <a href="#" class="link">Your Link 3</a>
    <a href="#" class="link">Your Link 4</a>

    <!-- SECOND IMAGE BLOCK -->
    <div class="image-block">
      <img src="your-image-2.jpg" alt="Optional Image">
    </div>

    <a href="#" class="link">Another Link</a>

    <footer>
      © 2026 Your Name
    </footer>

  </div>

</body>
</html>
